server:
  port: 50005
  servlet:
    context-path: /api-talent-human
spring:
  profiles:
    active: dev
  application:
    name: api-talent-human-v1
  datasource:
    url: jdbc:postgresql://localhost:51005/talenthumandb
    username: talenthumanuser
    password: talenthumandbpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true
logging:
  level:
    com.jpinto.refund: DEBUG
    org.springframework.web: INFO
    org.flywaydb: DEBUG