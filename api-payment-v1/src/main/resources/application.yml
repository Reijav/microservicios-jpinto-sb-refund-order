spring:
  profiles:
    active: dev
  application:
    name: api-payment-v1

  datasource:
    url: jdbc:postgresql://localhost:51003/paymentdb
    username: ${DB_USERNAME:paymentuser}
    password: ${DB_PASSWORD:paymentpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 50007
  servlet:
    context-path: /api-payment

logging:
  level:
    com.jpinto.payment: DEBUG
    org.springframework.web: ERROR
